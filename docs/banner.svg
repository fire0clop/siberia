<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" fill="none" role="img" aria-label="Siberia — messenger with WebRTC calls">
<defs>
<linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1838"/><stop offset="0.55" stop-color="#122a63"/><stop offset="1" stop-color="#0e2550"/></linearGradient>
<linearGradient id="sout" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a84ff"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
<linearGradient id="sind" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5e5ce6"/><stop offset="1" stop-color="#704df7"/></linearGradient>
<radialGradient id="sg1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#0a84ff" stop-opacity="0.5"/><stop offset="1" stop-color="#0a84ff" stop-opacity="0"/></radialGradient>
<radialGradient id="sg2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#704df7" stop-opacity="0.5"/><stop offset="1" stop-color="#704df7" stop-opacity="0"/></radialGradient>
<filter id="ssoft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
<style>@keyframes wv{0%,100%{opacity:.5}50%{opacity:1}} .wv{animation:wv 1.4s ease-in-out infinite}</style>
</defs>
<rect width="1200" height="240" rx="20" fill="url(#sbg)"/>
<ellipse cx="250" cy="70" rx="240" ry="150" fill="url(#sg1)" filter="url(#ssoft)"/>
<ellipse cx="1000" cy="190" rx="260" ry="160" fill="url(#sg2)" filter="url(#ssoft)"/>
<g transform="translate(74 112)">
 <text x="0" y="0" font-size="56" font-weight="700" fill="#eaf1ff" style="font-family:-apple-system,'Helvetica Neue','Inter',Arial,sans-serif;">Siberia</text>
 <rect x="3" y="18" width="230" height="4" rx="2" fill="url(#sout)"/>
 <text x="3" y="52" font-size="17" font-weight="500" fill="#9db6e0" style="font-family:-apple-system,'Helvetica Neue','Inter',Arial,sans-serif;">Telegram-class messenger · 1:1 WebRTC calls</text>
</g>
<!-- chat bubbles + call waveform -->
<g transform="translate(902 44)">
 <g><rect x="0" y="0" width="150" height="46" rx="16" fill="#1f2f57"/><path d="M8 44 L2 60 L26 44 Z" fill="#1f2f57"/><circle cx="26" cy="23" r="4.5" fill="#7f9bd0"/><circle cx="44" cy="23" r="4.5" fill="#7f9bd0"/><circle cx="62" cy="23" r="4.5" fill="#7f9bd0"/></g>
 <g transform="translate(78 56)"><rect x="0" y="0" width="176" height="46" rx="16" fill="url(#sout)"/><path d="M168 44 L174 60 L150 44 Z" fill="#22d3ee"/><rect x="18" y="16" width="120" height="5" rx="2.5" fill="#ffffff" opacity="0.9"/><rect x="18" y="27" width="80" height="5" rx="2.5" fill="#ffffff" opacity="0.7"/></g>
 <g transform="translate(6 118)" fill="#22d3ee">
  <rect class="wv" x="0" width="5" height="18" y="-9" rx="2.5"/><rect class="wv" x="12" width="5" height="34" y="-17" rx="2.5" style="animation-delay:.15s"/><rect class="wv" x="24" width="5" height="46" y="-23" rx="2.5" style="animation-delay:.3s"/><rect class="wv" x="36" width="5" height="28" y="-14" rx="2.5" style="animation-delay:.45s"/><rect class="wv" x="48" width="5" height="40" y="-20" rx="2.5" style="animation-delay:.2s"/><rect class="wv" x="60" width="5" height="22" y="-11" rx="2.5" style="animation-delay:.5s"/><rect class="wv" x="72" width="5" height="34" y="-17" rx="2.5" style="animation-delay:.35s"/>
  <g transform="translate(96 -9)" fill="#5e5ce6"><circle cx="8" cy="8" r="12"/><path d="M3 3 l14 8 l-14 8 Z" fill="#fff"/></g>
 </g>
</g>
</svg>