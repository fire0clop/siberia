name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: backend/Siberia

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siberia
          POSTGRES_USER: siberia
          POSTGRES_PASSWORD: siberia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U siberia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://siberia:siberia@localhost:5432/siberia
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_DAYS: 1
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      REDIS_URL: redis://localhost:6379/0
      CORS_ORIGINS: "*"
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt arq

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Start API server
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run E2E tests
        run: python tests/e2e_api_runner.py

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: e2e
    # Деплой только вручную (Actions → CI → Run workflow), пока не настроены
    # secrets: DOCKER_USERNAME, DOCKER_PASSWORD, DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/siberia-api:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/siberia-api:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/siberia-api:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/siberia-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/siberia-api:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/siberia
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T api alembic upgrade head
