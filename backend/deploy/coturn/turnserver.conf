# /etc/turnserver.conf — продакшен-конфиг coturn для Siberia
#
# Установка (Ubuntu/Debian):
#     sudo apt update && sudo apt install -y coturn
#     sudo cp turnserver.conf /etc/turnserver.conf
#     sudo systemctl enable --now coturn
#
# !!! ЗАМЕНИТЬ перед запуском:
#   * realm            → твой домен (например siberia.app)
#   * external-ip      → публичный IPv4 твоего сервера
#   * user             → логин:пароль (или включи use-auth-secret + static-auth-secret)
#   * server-name      → твой домен
#   * TLS-сертификаты (cert / pkey) — если делаем turns:// (TURN over TLS, порт 5349)

# ─── Listening ────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# IP который coturn будет показывать клиентам как "ваш внешний адрес".
# На VPS без NAT — это публичный IP интерфейса. На VPS за NAT (редко) —
# external-ip=PUBLIC_IP/PRIVATE_IP.
external-ip=REPLACE_WITH_PUBLIC_IP

# ─── Auth ─────────────────────────────────────────────────────────────────────
# Простейшая схема — фиксированный список пользователей.
# Для прода лучше use-auth-secret (динамические credentials с HMAC).
lt-cred-mech
user=siberiauser:REPLACE_WITH_STRONG_PASSWORD

realm=siberia.app
server-name=siberia.app

# Альтернатива на потом — short-lived credentials через REST API (recommended):
# use-auth-secret
# static-auth-secret=REPLACE_WITH_64_RANDOM_BYTES_HEX
# (тогда бэк будет генерить username = "<unix-ts>:<user-id>", password = HMAC-SHA1)

# ─── Range UDP-портов для relay ───────────────────────────────────────────────
# Открой их в файрволле (ufw allow 49152:65535/udp)
min-port=49152
max-port=65535

# ─── Безопасность ─────────────────────────────────────────────────────────────
# Запрещаем relay в loopback/приватные сети — защита от SSRF-эксплойтов TURN.
no-loopback-peers
no-multicast-peers
# При желании можно добавить allowed-peer-ip / denied-peer-ip

# Отключаем устаревший STUN-binding с RFC3489 / no-auth-pings
no-tlsv1
no-tlsv1_1

# Логи в syslog (или укажи путь к файлу)
syslog
no-stdout-log

# ─── TLS (опционально, для turns://) ──────────────────────────────────────────
# Раскомментируй после получения Let's Encrypt серта для своего домена:
# cert=/etc/letsencrypt/live/siberia.app/fullchain.pem
# pkey=/etc/letsencrypt/live/siberia.app/privkey.pem
# cipher-list="ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256"

# ─── Производительность ──────────────────────────────────────────────────────
# Для маленького VPS можно не трогать. Для нагруженного:
# total-quota=1200
# bps-capacity=0
# stale-nonce=600

# ─── После деплоя ─────────────────────────────────────────────────────────────
# В iOS-коде (Features/Calls/CallManager.swift) добавь в iceServers:
#
#     RTCIceServer(
#         urlStrings: ["turn:siberia.app:3478", "turns:siberia.app:5349"],
#         username: "siberiauser",
#         credential: "REPLACE_WITH_STRONG_PASSWORD"
#     )
